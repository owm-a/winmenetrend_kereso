<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WinMenetrend Kereső</title>
<style>
body { font-family: Arial, sans-serif; margin: 40px; }
.container { max-width: 500px; width: 90%; margin: auto; }
label { display: block; margin-top: 20px; font-weight: bold; }
input, select, button { margin-top: 5px; width: 100%; padding: 12px; font-size: 16px; }
button { margin-top: 15px; cursor: pointer; }
h2 { margin-top: 30px; }

/* Mobil optimalizálás */
@media (max-width: 480px) {
  body { margin: 20px; }
  h2 { font-size: 20px; }
  input, button { font-size: 14px; padding: 10px; }
}
</style>
</head>
<body>
<div class="container">
  <h2>Viszonylat kereső (Arrivás vonalak)</h2>
  <form id="lineForm">
    <label for="line">Vonal:</label>
    <input type="text" id="line" placeholder="pl. 114">
    
    <label for="date">Dátum:</label>
    <input type="date" id="date">
    
    <button type="submit">Megnyitás</button>
  </form>

  <h2>Jármű kereső</h2>
  <form id="vehicleForm">
    <label for="vehicle">Rendszám:</label>
    <input type="text" id="vehicle" placeholder="kötőjel nélkül - pl. AOCT654">
    <button type="submit">Megnyitás</button>
  </form>
</div>

<script>
// Mai dátum alapértelmezett
document.getElementById('date').value = new Date().toISOString().split('T')[0];

// Viszonylat link generálás
function openLine() {
  let line = document.getElementById('line').value.trim();
  let date = document.getElementById('date').value;

  if(line === "8E") line = "0085";
  if(line === "20E") line = "0205";
  if(line === "25") line = "0250";
  if(line === "225") line = "2250";
  if(line === "30") line = "0300";
  if(line === "30A") line = "0301";
  if(line === "230") line = "2300";
  if(line === "31") line = "0310";
  if(line === "35") line = "0350";
  if(line === "36") line = "0360";
  if(line === "44") line = "0440";
  if(line === "53") line = "0530";
  if(line === "66") line = "0660";
  if(line === "66B") line = "0660";
  if(line === "") line = "";
  if(line === "") line = "";
  if(line === "") line = "";
  if(line === "") line = "";
  if(line === "") line = "";
  if(line === "") line = "";
  if(line === "") line = "";
  if(line === "") line = "";
  
  
  if(!line || !date) { alert("Kérlek töltsd ki mindkét mezőt!"); return; }
  
  let url = `https://online.winmenetrend.hu/budapest/latest/lines/${line}/vehicles?date=${date}`;
  window.open(url, "_blank");
}

// Jármű link generálás
function openVehicle() {
  let vehicle = document.getElementById('vehicle').value.trim();
  if(!vehicle) { alert("Kérlek írd be a jármű azonosítót!"); return; }

  let url = `https://online.winmenetrend.hu/futar/history/vehicles/${vehicle}`;
  window.open(url, "_blank");
}

// Formok submit kezelése Enter-re és gombra kattintásra
document.getElementById('lineForm').addEventListener('submit', function(e) {
  e.preventDefault(); // ne frissüljön az oldal
  openLine();
});

document.getElementById('vehicleForm').addEventListener('submit', function(e) {
  e.preventDefault(); // ne frissüljön az oldal
  openVehicle();
});
</script>
</body>
</html>
