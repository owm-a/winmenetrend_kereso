<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WinMenetrend Kereső</title>

<style>
body { font-family: Arial, sans-serif; margin: 20px; }
.container { max-width: 500px; width: 90%; margin: auto; }

h2 { margin: 20px 0 10px; font-size: 22px; }

label { display: block; margin-top: 15px; font-weight: bold; }

input, button {
  margin-top: 5px;
  padding: 12px;
  font-size: 16px;
  width: 100%;
  box-sizing: border-box;
}

button { cursor: pointer; }

/* Hiba */
.error { border: 2px solid red !important; }
.error-text { color: red; font-size: 12px; margin-top: 5px; }

/* Előzmények */
.history { font-size: 12px; margin-top: 5px; }
.history span {
  background: #eee;
  padding: 3px 6px;
  margin: 2px;
  display: inline-block;
  cursor: pointer;
  border-radius: 4px;
}

/* Dark mode */
body.dark { background: #1e1e1e; color: #eee; }
body.dark input, body.dark button {
  background: #333;
  color: #eee;
  border: 1px solid #555;
}
body.dark .history span { background: #444; }

/* Layout */
.flex-row { display: flex; gap: 10px; }
.flex-row > div { flex: 1; }

.note { text-align: center; font-size: 12px; margin: 5px 0; }
.note-small { font-size: 11px; margin-top: 8px; text-align: center; }

hr { margin: 20px 0; border: none; border-top: 1px solid #ccc; }

.usage {
  font-size: 12px;
  margin-top: 20px;
  text-align: left;
}

/* Mobil */
@media (max-width: 480px) {
  input, button { font-size: 14px; padding: 10px; }
}
</style>
</head>

<body>

<button onclick="toggleDark()">🌙 Sötét mód</button>

<div class="container">

<h2>Viszonylatkereső</h2>
<form id="lineForm">
  <label>Vonal:</label>
  <input id="line">

  <label>Dátum:</label>
  <input type="date" id="date">

  <div class="note">
    Megnyitás után kattints a megfelelő forgalmi számra.
  </div>

  <button type="submit">Megnyitás</button>
  <button type="button" onclick="clearForm('lineForm')">❌ Törlés</button>

  <div id="lineError" class="error-text"></div>
  <div id="lineHistory" class="history"></div>
</form>

<hr>

<h2>Járműkereső</h2>

<form id="vehicleForm">
  <label>Rendszám:</label>
  <input id="vehicle">
  <button type="submit">Keresés</button>
  <button type="button" onclick="clearForm('vehicleForm')">❌ Törlés</button>

  <div id="vehicleError" class="error-text"></div>
  <div id="vehicleHistory" class="history"></div>
</form>

<hr>

<form id="lineFordaForm">
  <div class="flex-row">
    <div>
      <label>Vonal:</label>
      <input id="lineForda">
    </div>
    <div>
      <label>Forda:</label>
      <input type="number" id="forda">
    </div>
  </div>

  <label>FUTÁR:</label>
  <input id="futar">

  <button type="submit">Keresés</button>
  <button type="button" onclick="clearForm('lineFordaForm')">❌ Törlés</button>

  <div id="fordaError" class="error-text"></div>
  <div id="lineFordaHistory" class="history"></div>
</form>

<div class="usage">
  Egyszerű kereső a WinMenetrendhez.
</div>

</div>

<script>
// Autofókusz + dátum
document.getElementById('line').focus();
document.getElementById('date').value = new Date().toISOString().split('T')[0];

// Dark mode
function toggleDark() {
  document.body.classList.toggle("dark");
}

// Törlés
function clearForm(id) {
  document.getElementById(id).reset();
}

// Hiba
function showError(id, textId, msg) {
  document.getElementById(id).classList.add("error");
  document.getElementById(textId).innerText = msg;
}
function clearError(id, textId) {
  document.getElementById(id).classList.remove("error");
  document.getElementById(textId).innerText = "";
}

// Előzmények
function saveHistory(key, value) {
  if(!value) return;
  let arr = JSON.parse(localStorage.getItem(key)) || [];
  arr = arr.filter(v => v !== value);
  arr.unshift(value);
  arr = arr.slice(0,5);
  localStorage.setItem(key, JSON.stringify(arr));
  renderHistory(key);
}

function renderHistory(key) {
  const el = document.getElementById(key+"History");
  let arr = JSON.parse(localStorage.getItem(key)) || [];
  el.innerHTML = "Előzmények: ";
  arr.forEach(v=>{
    let s = document.createElement("span");
    s.innerText = v;
    s.onclick=()=>document.getElementById(key).value=v;
    el.appendChild(s);
  });
}

["line","vehicle","lineForda"].forEach(renderHistory);

// MAP
function mapLine(line){
  line=line.trim().toUpperCase();
  if(!line) return "";
  const m={A:'1',B:'2',M:'4',E:'5'};
  if(line==="104") return "1041";
  if(line.length>=3 && /[ABME]{2}$/.test(line)){
    let p=line.slice(0,-2);
    if(p.length===1)p='00'+p;
    else if(p.length===2)p='0'+p;
    return p+(m[line.at(-2)]||0)+(m[line.at(-1)]||0);
  }
  if(line.length===4 && /^\d{4}$/.test(line)) return line;
  let last=m[line.at(-1)]||'0';
  if(m[line.at(-1)]) line=line.slice(0,-1);
  if(line.length===1) line='00'+line;
  else if(line.length===2) line='0'+line;
  return line+last;
}

// FUNKCIÓK
function openLine(){
  let input=document.getElementById('line');
  let line=mapLine(input.value);
  let date=document.getElementById('date').value;

  clearError('line','lineError');

  if(!line||!date){
    showError('line','lineError',"Hiányzó adat!");
    return;
  }

  saveHistory("line",input.value);
  window.open(`https://online.winmenetrend.hu/budapest/latest/lines/${line}/vehicles?date=${date}`);
}

function openVehicle(){
  let input=document.getElementById('vehicle');
  let v=input.value.trim();

  clearError('vehicle','vehicleError');

  if(!v){
    showError('vehicle','vehicleError',"Hiányzó rendszám!");
    return;
  }

  saveHistory("vehicle",v);
  window.open(`https://online.winmenetrend.hu/futar/history/vehicles/${v}`);
}

function openLineForda(){
  let input=document.getElementById('lineForda');
  let line=mapLine(input.value);
  let forda=document.getElementById('forda').value;

  clearError('lineForda','fordaError');

  if(!line||!forda){
    showError('lineForda','fordaError',"Hiányzó adat!");
    return;
  }

  saveHistory("lineForda",input.value);
  window.open(`https://online.winmenetrend.hu/futar/history/lines/${line}/${forda}?date=${new Date().toISOString().split('T')[0]}`);
}

// Submitok
lineForm.onsubmit=e=>{e.preventDefault();openLine();}
vehicleForm.onsubmit=e=>{e.preventDefault();openVehicle();}
lineFordaForm.onsubmit=e=>{e.preventDefault();openLineForda();}
</script>

</body>
</html>
