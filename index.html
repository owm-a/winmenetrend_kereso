<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WinMenetrend Kereső</title>
<style>
body { font-family: Arial, sans-serif; margin: 40px; }
.container { max-width: 500px; width: 90%; margin: auto; }
label { display: block; margin-top: 20px; font-weight: bold; }
input, select, button { margin-top: 5px; width: 100%; padding: 12px; font-size: 16px; }
button { margin-top: 15px; cursor: pointer; }
h2 { margin-top: 30px; }

/* Mobil optimalizálás */
@media (max-width: 480px) {
  body { margin: 20px; }
  h2 { font-size: 20px; }
  input, button { font-size: 14px; padding: 10px; }
}
</style>
</head>
<body>
<div class="container">
  <h2>Viszonylat kereső (Arrivás vonalak)</h2>
  <form id="lineForm">
    <label for="line">Vonal:</label>
    <input type="text" id="line" placeholder="pl. 114">
    
    <label for="date">Dátum:</label>
    <input type="date" id="date">
    
    <button type="submit">Megnyitás</button>
  </form>

  <h2>Jármű kereső</h2>
  <form id="vehicleForm">
    <label for="vehicle">Rendszám:</label>
    <input type="text" id="vehicle" placeholder="kötőjel nélkül - pl. AOCT654">
    <button type="submit">Megnyitás</button>
  </form>
</div>

<script>
// Mai dátum alapértelmezett
document.getElementById('date').value = new Date().toISOString().split('T')[0];

// Viszonylat link generálás
function openLine() {
  let line = document.getElementById('line').value.trim();
  let date = document.getElementById('date').value;

  if(line === "8E") line = "0085";
  if(line === "20E") line = "0205";
  if(line === "25" || line === "225") line = "0250";
  if(line === "30" || line === "30A" || line === "230") line = "0300";
  if(line === "31") line = "0310";
  if(line === "35") line = "0350";
  if(line === "36") line = "0360";
  if(line === "44") line = "0440";
  if(line === "53") line = "0530";
  if(line === "66" || line === "66B" || line === "66E") line = "0660";
  if(line === "71" || line === "152" || line === "179") line = "0710";
  if(line === "96" || line === "96A" || line === "296") line = "0960";
  if(line === "97E") line = "0975";
  if(line === "100E") line = "1005";
  if(line === "101B" || line === "101E") line = "1015";
  if(line === "104" || line === "104A" || line === "204") line = "1041";
  if(line === "105" || line === "210" || line === "210B") line = "1050";
  if(line === "110" || line === "112") line = "1120";
  if(line === "114" || line === "213" || line === "214") line = "1140";
  if(line === "120") line = "1200";
  if(line === "121") line = "1210";
  if(line === "122E") line = "1225";
  if(line === "124" || line === "125") line = "1240";
  if(line === "126") line = "1260";
  if(line === "131" || line === "231" || line === "231B") line = "1310";
  if(line === "133E") line = "1335";
  if(line === "134") line = "1340";
  if(line === "138") line = "1380";
  if(line === "139") line = "1390";
  if(line === "142E") line = "1425";
  if(line === "147" || line === "170" || line === "270") line = "1470";
  if(line === "148") line = "1480";
  if(line === "151") line = "151";
  if(line === "153") line = "1530";
  if(line === "154") line = "1540";
  if(line === "159") line = "1590";
  if(line === "182" || line === "282E") line = "1820";
  if(line === "182A") line = "1821";
  if(line === "184" || line === "284E") line = "1840";
  if(line === "196" || line === "196A") line = "1960";
  if(line === "212" || line === "212A" || line === "212B") line = "2120";
  if(line === "220") line = "2200";
  if(line === "223E") line = "2235";
  if(line === "224" || line === "224E") line = "2240";
  if(line === "907") line = "9070";
  if(line === "909") line = "9090";
  if(line === "914A") line = "9141";
  if(line === "930") line = "9300";
  if(line === "941") line = "9410";
  if(line === "950" || line === "950A") line = "9500";
  if(line === "973") line = "9730";
  if(line === "979" || line === "979A") line = "9790";
  
  if(!line || !date) { alert("Kérlek töltsd ki mindkét mezőt!"); return; }
  
  let url = `https://online.winmenetrend.hu/budapest/latest/lines/${line}/vehicles?date=${date}`;
  window.open(url, "_blank");
}

// Jármű link generálás
function openVehicle() {
  let vehicle = document.getElementById('vehicle').value.trim();
  if(!vehicle) { alert("Kérlek írd be a jármű azonosítót!"); return; }

  let url = `https://online.winmenetrend.hu/futar/history/vehicles/${vehicle}`;
  window.open(url, "_blank");
}

// Formok submit kezelése Enter-re és gombra kattintásra
document.getElementById('lineForm').addEventListener('submit', function(e) {
  e.preventDefault(); // ne frissüljön az oldal
  openLine();
});

document.getElementById('vehicleForm').addEventListener('submit', function(e) {
  e.preventDefault(); // ne frissüljön az oldal
  openVehicle();
});
</script>
</body>
</html>
